<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#120815"/>
      <stop offset="1" stop-color="#2a1025"/>
    </linearGradient>

    <linearGradient id="snakeBody" x1="120" y1="70" x2="520" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff66b3"/>
      <stop offset="0.5" stop-color="#ff8fcb"/>
      <stop offset="1" stop-color="#ffc2e0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <g id="heart">
      <path d="M0 7C0 3.4 2.9 0.5 6.5 0.5C9 0.5 11.2 1.9 12.3 4C13.4 1.9 15.6 0.5 18.1 0.5C21.7 0.5 24.6 3.4 24.6 7C24.6 14.2 17.2 18.4 12.3 23.2C7.4 18.4 0 14.2 0 7Z" fill="#ff78be"/>
    </g>
  </defs>

  <rect width="900" height="220" rx="28" fill="url(#bg)"/>

  <circle cx="120" cy="40" r="2.2" fill="#ffd6eb" opacity="0.7"/>
  <circle cx="250" cy="30" r="1.8" fill="#ffd6eb" opacity="0.6"/>
  <circle cx="760" cy="50" r="2.4" fill="#ffd6eb" opacity="0.8"/>
  <circle cx="820" cy="160" r="1.8" fill="#ffd6eb" opacity="0.6"/>
  <circle cx="680" cy="185" r="2.2" fill="#ffd6eb" opacity="0.7"/>

  <g filter="url(#glow)">
    <circle cx="140" cy="120" r="26" fill="url(#snakeBody)"/>
    <circle cx="185" cy="122" r="24" fill="url(#snakeBody)"/>
    <circle cx="230" cy="126" r="22" fill="url(#snakeBody)"/>
    <circle cx="272" cy="132" r="20" fill="url(#snakeBody)"/>
    <circle cx="312" cy="136" r="18" fill="url(#snakeBody)"/>
    <circle cx="348" cy="136" r="17" fill="url(#snakeBody)"/>
    <circle cx="382" cy="132" r="18" fill="url(#snakeBody)"/>
    <circle cx="418" cy="122" r="21" fill="url(#snakeBody)"/>
    <circle cx="462" cy="110" r="25" fill="url(#snakeBody)"/>
  </g>

  <g filter="url(#glow)">
    <ellipse cx="545" cy="102" rx="46" ry="34" fill="url(#snakeBody)">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 8 0; 0 0"
        dur="2.3s"
        repeatCount="indefinite"/>
    </ellipse>

    <circle cx="560" cy="92" r="5" fill="#2d0f23">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 8 0; 0 0"
        dur="2.3s"
        repeatCount="indefinite"/>
    </circle>
    <circle cx="562" cy="90" r="1.6" fill="#fff5fb">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 8 0; 0 0"
        dur="2.3s"
        repeatCount="indefinite"/>
    </circle>

    <circle cx="575" cy="108" r="5" fill="#ffb3d9" opacity="0.9">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 8 0; 0 0"
        dur="2.3s"
        repeatCount="indefinite"/>
    </circle>

    <path d="M586 108 C602 105, 618 105, 632 108 C620 112, 602 114, 586 111 Z" fill="#ff4fa3">
      <animateTransform
        attributeName="transform"
        type="translate"
        values="0 0; 10 0; 0 0"
        dur="2.3s"
        repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#glow)">
    <g transform="translate(670 86)">
      <use href="#heart">
        <animateTransform attributeName="transform" type="scale"
          values="1;1.15;1" dur="1.2s" repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(730 58) scale(0.9)">
      <use href="#heart">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -5; 0 0" dur="1.8s" repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(748 116) scale(0.75)">
      <use href="#heart">
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 5; 0 0" dur="1.6s" repeatCount="indefinite"/>
      </use>
    </g>

    <g transform="translate(802 87) scale(1.1)">
      <use href="#heart">
        <animateTransform attributeName="transform" type="scale"
          values="1;1.08;1" dur="1.4s" repeatCount="indefinite"/>
      </use>
    </g>
  </g>

  <text x="450" y="185" text-anchor="middle"
        fill="#ffd6eb" font-size="18" font-family="Verdana, Arial, sans-serif" letter-spacing="1.5">
    pink snake eating hearts
  </text>
</svg>
